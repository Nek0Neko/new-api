# New-API Docker Compose Configuration
# 
# Quick Start:
#   1. docker-compose up -d
#   2. Access at http://localhost:3000
#
# Using MySQL instead of PostgreSQL:
#   1. Comment out the postgres service and SQL_DSN line 15
#   2. Uncomment the mysql service and SQL_DSN line 16
#   3. Uncomment mysql in depends_on (line 28)
#   4. Uncomment mysql_data in volumes section (line 64)
#
# ⚠️  IMPORTANT: Change all default passwords before deploying to production!

version: '3.4' # For compatibility with older Docker versions

services:
  new-api:
    image: ccr.ccs.tencentyun.com/puddi/new-api:latest
    container_name: new-api
    # Pin hostname so self-inspect via the docker API resolves even after a
    # watchtower-driven recreate. Without this, the hostname auto-generated at
    # first start gets copied to recreated containers as a stale short-id and
    # the /containers/<hostname>/json lookup returns 404.
    hostname: new-api
    restart: always
    command: --log-dir /app/logs
    labels:
      # Enable watchtower for this container (used by the in-app upgrade button)
      - "com.centurylinklabs.watchtower.enable=true"
    ports:
      - "3000:3000"
    volumes:
      - ./data:/data
      - ./logs:/app/logs
      # Read-only docker socket: lets the app inspect its own image digest.
      # Update execution itself is delegated to the watchtower service below.
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - SQL_DSN=postgresql://root:123456@postgres:5432/new-api # ⚠️ IMPORTANT: Change the password in production!
#      - SQL_DSN=root:123456@tcp(mysql:3306)/new-api  # Point to the mysql service, uncomment if using MySQL
      - REDIS_CONN_STRING=redis://:123456@redis:6379 # ⚠️ IMPORTANT: Change the password in production!
      - TZ=Asia/Shanghai
      # In-app upgrade endpoint configuration (consumed by controller/maintenance.go).
      # Both values must match the watchtower service. Generate the token with:
      #   openssl rand -hex 32
      # Recommended: put real values in a .env file (next to this compose file) and
      # use ${VAR} substitution instead of inlining the secrets here.
      - WATCHTOWER_URL=http://watchtower:8080
      - WATCHTOWER_TOKEN=${WATCHTOWER_TOKEN:?set WATCHTOWER_TOKEN in .env}
      # Private registry credentials used ONLY for the image-status digest check.
      # The actual pull/recreate is performed by the watchtower service below, which
      # reads credentials from the host's /root/.docker/config.json (mounted ro).
      # Multi-registry deployments: also support REGISTRY_USERNAME_<HOST> /
      # REGISTRY_PASSWORD_<HOST> with the host's dots replaced by underscores.
      - REGISTRY_USERNAME=${REGISTRY_USERNAME:-}
      - REGISTRY_PASSWORD=${REGISTRY_PASSWORD:-}
      - ERROR_LOG_ENABLED=true # 是否启用错误日志记录 (Whether to enable error log recording)
      - BATCH_UPDATE_ENABLED=true  # 是否启用批量更新 (Whether to enable batch update)
      - NODE_NAME=new-api-node-1  # 节点名称，用于审计日志中标识节点身份；多节点/容器部署时建议设置 (Node name used in audit logs; recommended when running multiple instances or in containers)
#      - STREAMING_TIMEOUT=300  # 流模式无响应超时时间，单位秒，默认120秒，如果出现空补全可以尝试改为更大值 （Streaming timeout in seconds, default is 120s. Increase if experiencing empty completions）
#      - SESSION_SECRET=random_string  # 多机部署时设置，必须修改这个随机字符串！！ （multi-node deployment, set this to a random string!!!!!!!）
#      - SYNC_FREQUENCY=60  # Uncomment if regular database syncing is needed
#      - GOOGLE_ANALYTICS_ID=G-XXXXXXXXXX  # Google Analytics 的测量 ID (Google Analytics Measurement ID)
#      - UMAMI_WEBSITE_ID=xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx  # Umami 网站 ID (Umami Website ID)
#      - UMAMI_SCRIPT_URL=https://analytics.umami.is/script.js  # Umami 脚本 URL，默认为官方地址 (Umami Script URL, defaults to official URL)

    depends_on:
      - redis
      - postgres
#      - mysql  # Uncomment if using MySQL
    networks:
      - new-api-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/status | grep -o '\"success\":\\s*true' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Watchtower drives the in-app "click to update" flow.
  # It only acts on containers labeled com.centurylinklabs.watchtower.enable=true.
  # Triggered via HTTP API (no scheduled polling) so updates happen only on user request.
  #
  # Image note: the original containrrr/watchtower stopped publishing releases in
  # 2023 and its bundled Docker client (API v1.25) no longer talks to Docker
  # Engine 25+ ("client version 1.25 is too old"). nickfedor/watchtower is an
  # actively maintained fork that keeps the same env-var contract.
  watchtower:
    image: nickfedor/watchtower:latest
    container_name: watchtower
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # Pass through the host's docker login credentials so watchtower can pull
      # private images (e.g. ccr.ccs.tencentyun.com). On the production host run:
      #   docker login ccr.ccs.tencentyun.com -u <username>
      # which writes ~/.docker/config.json. If running docker as root that file
      # lives at /root/.docker/config.json — set DOCKER_CONFIG_PATH in .env to
      # the actual host path. Defaults to an empty config so local smoke tests
      # with public images work without any host setup.
      - ${DOCKER_CONFIG_PATH:-./.docker/config.empty.json}:/config.json:ro
    environment:
      - WATCHTOWER_HTTP_API_UPDATE=true
      - WATCHTOWER_HTTP_API_TOKEN=${WATCHTOWER_TOKEN:?set WATCHTOWER_TOKEN in .env}
      - WATCHTOWER_LABEL_ENABLE=true # Only update containers explicitly opted-in via label
      - WATCHTOWER_CLEANUP=true      # Remove old images after a successful update
      - WATCHTOWER_INCLUDE_RESTARTING=true
      # Registry credentials for pulling private images. Watchtower checks
      # REPO_USER / REPO_PASS first and only falls back to /config.json when
      # they are empty. Wiring these through means the in-app upgrade keeps
      # working even if DOCKER_CONFIG_PATH points at a missing file (in which
      # case docker silently bind-mounts an empty directory at /config.json
      # and watchtower fails authentication with a hard-to-spot error).
      - REPO_USER=${REGISTRY_USERNAME:-}
      - REPO_PASS=${REGISTRY_PASSWORD:-}
      - TZ=Asia/Shanghai
    # No scheduled run; --http-api-update disables periodic polling.
    command: --http-api-update --label-enable
    networks:
      - new-api-network

  redis:
    image: redis:latest
    container_name: redis
    restart: always
    command: ["redis-server", "--requirepass", "123456"]  # ⚠️ IMPORTANT: Change this password in production!
    networks:
      - new-api-network

  postgres:
    image: postgres:15
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: 123456  # ⚠️ IMPORTANT: Change this password in production!
      POSTGRES_DB: new-api
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - new-api-network
#    ports:
#      - "5432:5432"  # Uncomment if you need to access PostgreSQL from outside Docker

#  mysql:
#    image: mysql:8.2
#    container_name: mysql
#    restart: always
#    environment:
#      MYSQL_ROOT_PASSWORD: 123456  # ⚠️ IMPORTANT: Change this password in production!
#      MYSQL_DATABASE: new-api
#    volumes:
#      - mysql_data:/var/lib/mysql
#    networks:
#      - new-api-network
#    ports:
#      - "3306:3306"  # Uncomment if you need to access MySQL from outside Docker

volumes:
  pg_data:
#  mysql_data:

networks:
  new-api-network:
    driver: bridge
